name: Announce a release

on:
  push:
    tags: announce-\d+.\d+.\d+

concurrency:
  group: announce-a-release

jobs:
  announce:
    name: Announce a release
    uses: ponylang/shared-workflows/.github/workflows/announce-a-library-release.yml@main
    secrets:
      token: ${{ secrets.PONYLANG_TOKEN }}
    with:
      version-file: VERSION
      changelog-file: CHANGELOG.md
