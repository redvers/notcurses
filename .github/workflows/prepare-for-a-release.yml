name: Prepare for a release

on:
  push:
    tags: release-\d+.\d+.\d+

concurrency:
  group: prepare-for-a-release

jobs:
  prepare:
    name: Prepare for a release
    uses: ponylang/shared-workflows/.github/workflows/prep-for-a-library-release.yml@main
    secrets:
      token: ${{ secrets.PONYLANG_TOKEN }}
    with:
      version-file: VERSION
      changelog-file: CHANGELOG.md
      corral-file: corral.json
